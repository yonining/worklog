<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>워크로그</title>
  <meta name="theme-color" content="#3B5BDB">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="워크로그">
  <style>
    :root {
      --bg:         #F2F4F8;
      --surface:    #FFFFFF;
      --border:     #E0E4EF;
      --border-mid: #CDD3E4;
      --text-1:     #17192A;
      --text-2:     #5A607A;
      --text-3:     #97A0BE;
      --accent:     #3B5BDB;
      --accent-h:   #2F4AC5;
      --accent-dim: #EDF2FF;
      --y-c:        #7048E8;
      --y-dim:      #F4F0FF;
      --t-c:        #1864AB;
      --t-dim:      #E7F5FF;
      --g-c:        #2B8A3E;
      --g-dim:      #EBFBEE;
      --r:          10px;
      --r-sm:       6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-1);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    button { cursor: pointer; font-family: inherit; }

    .app {
      max-width: 660px;
      margin: 0 auto;
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 54px;
    }

    .wordmark {
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--text-3);
    }

    .wordmark em {
      font-style: normal;
      color: var(--accent);
    }

    .wordmark-sub { display: none; }

    .data-btn {
      background: none;
      border: none;
      font-size: 18px;
      line-height: 1;
      padding: 4px;
      border-radius: 6px;
      opacity: 0.6;
      transition: opacity .15s;
      margin-left: auto;
    }
    .data-btn:hover { opacity: 1; }

    .data-section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-1);
      margin-bottom: 4px;
    }
    .data-desc {
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 10px;
      line-height: 1.55;
    }
    .data-action-btn {
      width: 100%;
      padding: 10px;
      border-radius: var(--r-sm);
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
      cursor: pointer;
      transition: background .12s;
    }
    .data-action-btn:hover { background: var(--bg); }
    .data-textarea {
      width: 100%;
      height: 90px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      color: var(--text-2);
      resize: none;
      margin-bottom: 10px;
      background: var(--bg);
    }
    .data-textarea:focus { outline: none; border-color: var(--accent); }

    .md-month-list { display: flex; flex-direction: column; gap: 6px; }
    .md-year-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-3);
      text-transform: uppercase;
      padding: 4px 0 2px;
    }
    .md-month-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      background: var(--bg);
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
    }
    .md-month-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
    }
    .md-month-count {
      font-size: 11px;
      color: var(--text-3);
    }
    .md-dl-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
      transition: background .12s;
    }
    .md-dl-btn:hover { background: var(--accent-dim); }

    .tab-bar {
      display: flex;
      padding: 0 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-3);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
      letter-spacing: 0.1px;
    }

    .tab-btn.on {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Panels ──────────────────────────────── */
    .panel {
      flex: 1;
      padding: 20px;
      display: none;
    }

    .panel.on { display: block; }

    /* ── Date nav ────────────────────────────── */
    .date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 10px 12px;
      margin-bottom: 14px;
    }

    .nav-arrow {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      border-radius: var(--r-sm);
      color: var(--text-2);
      font-size: 20px;
      transition: background .1s;
    }

    .nav-arrow:hover { background: var(--bg); }

    .date-center {
      flex: 1;
      text-align: center;
      position: relative;
      cursor: pointer;
      border-radius: var(--r-sm);
      padding: 2px 6px;
      transition: background .12s;
    }

    .date-center:hover { background: var(--bg); }

    .date-center-hint {
      position: absolute;
      right: 2px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      color: var(--text-3);
      opacity: 0;
      transition: opacity .15s;
    }

    .date-center:hover .date-center-hint { opacity: 1; }

    /* ── Cal popup ─────────────────────────────── */
    .cal-pop {
      display: none;
      position: fixed;
      z-index: 300;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
      padding: 14px;
      width: 280px;
      user-select: none;
    }
    .cal-pop.on { display: block; }

    .cal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .cal-head-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-1);
    }
    .cal-nav-btn {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none;
      border-radius: var(--r-sm);
      color: var(--text-2);
      font-size: 16px;
      cursor: pointer;
    }
    .cal-nav-btn:hover { background: var(--bg); }

    .cal-dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 4px;
    }
    .cal-dow {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-3);
      padding: 3px 0;
      letter-spacing: .3px;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-1);
      position: relative;
    }
    .cal-day:hover { background: var(--bg); }
    .cal-day.other-month { color: var(--text-3); }
    .cal-day.is-today { font-weight: 700; color: var(--accent); }
    .cal-day.is-today::after {
      content: '';
      position: absolute;
      bottom: 3px; left: 50%;
      transform: translateX(-50%);
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }
    .cal-day.selected {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    .cal-day.selected.is-today::after { background: #fff; }
    .cal-day.has-log::before {
      content: '';
      position: absolute;
      top: 4px; right: 4px;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
      opacity: .5;
    }
    .cal-day.selected.has-log::before { background: rgba(255,255,255,.6); }
    .cal-day.empty { cursor: default; pointer-events: none; }

    .date-label {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-1);
    }

    .date-sub {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 1px;
    }

    .today-pill {
      display: inline-block;
      background: var(--accent);
      color: white;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 20px;
      vertical-align: middle;
      margin-left: 5px;
      letter-spacing: 0.5px;
    }

    /* ── Cards ───────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .card-head {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-3);
    }

    .card-body { padding: 12px 16px; }

    textarea {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.65;
      color: var(--text-1);
      background: transparent;
    }

    textarea::placeholder { color: var(--text-3); }

    /* ── Checklist sections ──────────────────── */
    .cl-block {
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }

    .cl-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 15px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .cl-block.t .cl-head { background: var(--t-dim); color: var(--t-c); }

    .cl-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cl-block.t .cl-dot { background: var(--t-c); }

    .cl-list { background: var(--surface); }

    .cl-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      transition: background .1s;
    }

    .cl-item.sub {
      padding-left: 38px;
      background: #FAFBFF;
    }

    .cl-item.sub2 {
      padding-left: 64px;
      background: #F8F9FF;
    }

    .cl-item.sub2 .cl-check {
      width: 12px; height: 12px;
      border-radius: 50%;
      opacity: .5;
    }

    .cl-item.sub2 .cl-text { font-size: 12px; color: var(--text-3); }
    .cl-item.sub2 .cl-check:checked::after { left: 1px; top: 0px; width: 5px; height: 3px; }

    .cl-item:hover .cl-del { opacity: 1; }
    .cl-item:hover .cl-sub-btn { opacity: 1; }

    .cl-check {
      appearance: none;
      -webkit-appearance: none;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      transition: background .12s;
      border: 2px solid;
      border-radius: 5px;
      width: 17px;
      height: 17px;
    }

    .cl-item.sub .cl-check {
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }

    .cl-block.t .cl-check { border-color: var(--t-c); color: var(--t-c); }

    .cl-item.sub .cl-check { opacity: .65; }

    .cl-check:checked { background: currentColor; }

    .cl-check:checked::after {
      content: '';
      position: absolute;
      left: 2px; top: 1px;
      width: 7px; height: 4px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(-45deg);
    }

    .cl-item.sub .cl-check:checked::after {
      left: 1px; top: 0px;
      width: 6px; height: 3px;
    }

    .cl-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-1);
      transition: color .12s;
      cursor: text;
    }

    .cl-edit-input {
      flex: 1;
      font: inherit;
      font-size: 14px;
      color: var(--text-1);
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--accent);
      outline: none;
      padding: 0;
      line-height: 1.5;
    }

    .cl-item.sub .cl-text { font-size: 13px; color: var(--text-2); }

    .cl-check:checked + .cl-text {
      text-decoration: line-through;
      color: var(--text-3);
    }

    .cl-sub-btn {
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 13px;
      line-height: 1;
      padding: 2px 4px;
      opacity: 0;
      transition: opacity .12s, color .12s, background .12s;
      flex-shrink: 0;
      border-radius: 4px;
      cursor: pointer;
    }

    .cl-sub-btn:hover { color: var(--accent); background: var(--accent-dim); opacity: 1; }

    .cl-del {
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
      opacity: 0;
      transition: opacity .12s, color .12s;
      flex-shrink: 0;
    }

    .cl-del:hover { color: #C92A2A; opacity: 1; }

    .cl-inline-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px 6px 38px;
      border-top: 1px solid var(--border);
      background: #FAFBFF;
    }

    .cl-inline-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-1);
      background: transparent;
      padding: 1px 0;
    }

    .cl-inline-input::placeholder { color: var(--text-3); }

    .cl-add-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      transition: padding-left .12s;
    }

    .cl-add-row.sub  { padding-left: 38px; background: #FAFBFF; }
    .cl-add-row.sub2 { padding-left: 64px; background: #F8F9FF; }

    .cl-add-icon {
      width: 17px;
      height: 17px;
      border-radius: 5px;
      border: 2px dashed var(--text-3);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--text-3);
      line-height: 1;
      transition: border-radius .12s;
    }

    .cl-add-row.sub .cl-add-icon { border-radius: 50%; width: 14px; height: 14px; font-size: 11px; }

    .cl-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-1);
      background: transparent;
      padding: 1px 0;
    }

    .cl-add-row.sub .cl-input { font-size: 13px; }

    .cl-input::placeholder { color: var(--text-3); }

    .cl-tab-hint {
      font-size: 10px;
      color: var(--text-3);
      white-space: nowrap;
      opacity: 0;
      transition: opacity .15s;
      pointer-events: none;
      letter-spacing: 0.2px;
    }

    .cl-input:focus ~ .cl-tab-hint { opacity: 1; }

    /* ── Tags ────────────────────────────────── */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
      min-height: 4px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px 4px 11px;
      border-radius: 20px;
      cursor: pointer;
      transition: filter .12s;
    }

    .chip:hover { filter: brightness(.94); }

    .chip-x {
      background: none;
      border: none;
      opacity: .5;
      font-size: 15px;
      line-height: 1;
      padding: 0 1px;
      cursor: pointer;
      transition: opacity .12s;
    }

    .chip-x:hover { opacity: 1; }

    .tag-row {
      display: flex;
      gap: 8px;
      position: relative;
    }

    .tag-field {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      color: var(--text-1);
      background: var(--bg);
      transition: border-color .15s;
    }

    .tag-field:focus {
      border-color: var(--accent);
      background: var(--surface);
    }

    .tag-suggest {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: 0 6px 20px rgba(0,0,0,.12);
      z-index: 300;
      overflow: hidden;
      display: none;
      min-width: 180px;
    }

    .tag-suggest.on { display: block; }

    .suggest-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background .1s;
      font-size: 13px;
    }

    .suggest-item:hover, .suggest-item.focused { background: var(--bg); }
    .suggest-item { justify-content: space-between; }
    .suggest-del {
      font-size: 14px;
      color: var(--text-3);
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity .1s;
    }
    .suggest-item:hover .suggest-del { opacity: 1; }

    .suggest-empty {
      padding: 10px 12px;
      font-size: 13px;
      color: var(--text-3);
    }

    .btn-add {
      padding: 8px 15px;
      background: var(--accent-dim);
      color: var(--accent);
      border: none;
      border-radius: var(--r-sm);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      transition: background .15s, color .15s;
    }

    .btn-add:hover { background: var(--accent); color: #fff; }

    /* ── Tag popover ─────────────────────────── */
    .tag-pop {
      position: fixed;
      z-index: 500;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: 0 8px 28px rgba(0,0,0,.14);
      padding: 10px;
      width: 188px;
      display: none;
    }

    .tag-pop.on { display: block; }

    .pop-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-1);
      padding: 2px 4px 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pop-del {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 8px;
      background: none;
      border: none;
      border-radius: var(--r-sm);
      font-size: 13px;
      font-family: inherit;
      color: #C92A2A;
      cursor: pointer;
      margin-bottom: 6px;
      transition: background .1s;
    }

    .pop-del:hover { background: #FFF5F5; }

    .pop-colors-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-3);
      padding: 0 4px 4px;
    }

    .pop-color-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 6px;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: background .1s;
    }

    .pop-color-row:hover { background: var(--bg); }

    .pop-swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .pop-color-name {
      font-size: 13px;
      color: var(--text-1);
      flex: 1;
    }

    .pop-check {
      font-size: 13px;
      color: var(--accent);
      width: 14px;
      text-align: center;
    }

    /* ── Memo tabs ───────────────────────────── */
    .memo-tabs {
      display: flex;
      gap: 2px;
      background: var(--bg);
      padding: 3px;
      border-radius: var(--r-sm);
      margin-bottom: 12px;
    }

    .memo-tab {
      flex: 1;
      padding: 6px 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      border: none;
      background: none;
      border-radius: 5px;
      transition: all .12s;
    }

    .memo-tab.on {
      background: var(--surface);
      color: var(--text-1);
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    /* ── Save bar ────────────────────────────── */
    .save-bar {
      position: sticky;
      bottom: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom));
    }

    .btn-save {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--r);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
      transition: background .15s, transform .1s;
    }

    .btn-save:hover { background: var(--accent-h); }
    .btn-save:active { transform: scale(.99); }
    .btn-save.ok { background: #2B8A3E; }


    .h-del-btn {
      background: none;
      border: none;
      color: var(--text-3);
      padding: 4px 6px;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: color .12s, background .12s;
      line-height: 1;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
    }

    .h-del-btn:hover { color: #C92A2A; background: #FFF5F5; }
    .h-del-btn.confirming { color: #C92A2A; background: #FFF5F5; border: 1px solid #FFC9C9; padding: 3px 8px; }

    /* ── History ─────────────────────────────── */
    .filter-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 14px;
    }

    .filter-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      gap: 6px;
    }

    .filter-toggle:hover { background: var(--bg); }

    .filter-toggle-icon {
      font-size: 11px;
      color: var(--text-3);
      transition: transform .2s;
    }

    .filter-toggle-icon.open { transform: rotate(180deg); }

    .filter-active-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      flex: 1;
      min-width: 0;
    }

    .filter-active-tag {
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      font-weight: 600;
    }

    .filter-tag-chips {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 10px;
      flex-wrap: wrap;
      gap: 6px;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
    }
    .filter-tag-chips.on { display: flex; }

    .filter-tag-chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: opacity .12s, border-color .12s;
    }
    .filter-tag-chip:hover { opacity: .8; }
    .filter-tag-chip.selected { border-color: var(--text-1); }

    .filter-body {
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 0 12px 12px;
    }

    .filter-body.open { display: flex; }

    .filter-row {
      display: flex;
      gap: 8px;
    }

    .filter-field {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      color: var(--text-1);
      background: var(--bg);
      min-width: 0;
      transition: border-color .15s;
    }

    .filter-field:focus {
      border-color: var(--accent);
      background: var(--surface);
    }

    .h-entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }

    .h-entry:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px rgba(59,91,219,.08);
    }

    .h-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
      gap: 8px;
    }

    .h-date {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-1);
      flex-shrink: 0;
    }

    .h-day {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-3);
      margin-left: 4px;
    }

    .h-chips {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .h-chip {
      font-size: 11px;
      font-weight: 600;
      background: var(--g-dim);
      color: var(--g-c);
      padding: 2px 8px;
      border-radius: 20px;
    }

    .h-preview {
      font-size: 13px;
      color: var(--text-2);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.5;
    }

    .h-meta {
      display: flex;
      gap: 14px;
      margin-top: 8px;
    }

    .h-stat {
      font-size: 11px;
      color: var(--text-3);
    }

    .h-stat b {
      font-weight: 700;
      color: var(--text-2);
    }
    .h-diary-text {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-2);
    }

    .empty-msg {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-3);
    }

    .empty-msg strong {
      display: block;
      font-size: 15px;
      color: var(--text-2);
      margin-bottom: 4px;
    }

    /* ── Modal ───────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(17,20,40,.45);
      z-index: 200;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }

    .overlay.on { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: var(--r) var(--r) 0 0;
      width: 100%;
      max-width: 660px;
      max-height: 88vh;
      overflow-y: auto;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .modal-x {
      background: none;
      border: none;
      color: var(--text-2);
      font-size: 22px;
      line-height: 1;
      padding: 2px 6px;
    }

    .modal-body { padding: 16px 20px; }

    .m-section { margin-bottom: 18px; }

    .m-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-3);
      margin-bottom: 8px;
    }

    .m-list { list-style: none; }

    .m-list li {
      display: flex;
      gap: 9px;
      padding: 7px 0;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
    }

    .m-list li:last-child { border-bottom: none; }

    .m-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      margin-top: 10px;
      flex-shrink: 0;
    }

    .m-text {
      font-size: 14px;
      color: var(--text-1);
      white-space: pre-wrap;
      line-height: 1.7;
    }

    .m-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* ── Toast ───────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--text-1);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: var(--r);
      opacity: 0;
      transition: opacity .2s, transform .2s;
      z-index: 400;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.on {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── History week labels ──────────────────── */
    .h-week-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: var(--text-3);
      text-transform: uppercase;
      padding: 16px 2px 6px;
    }

    .h-week-label:first-child { padding-top: 2px; }

    .h-load-more {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 12px 0 4px;
      padding: 10px;
      border-radius: var(--r-sm);
      color: var(--text-3);
      font-size: 13px;
      cursor: pointer;
      transition: color .15s, background .15s;
    }
    .h-load-more:hover { color: var(--accent); background: var(--accent-dim); }

    /* ── 성과 탭 ── */
    .perf-month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .perf-month-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-1);
    }
    .perf-nav-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      width: 32px; height: 32px;
      font-size: 16px;
      color: var(--text-2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s;
    }
    .perf-nav-btn:hover { background: var(--surface); }

    .perf-doc {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 28px 24px 32px;
    }
    .perf-doc-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-1);
      margin-bottom: 24px;
      letter-spacing: -0.3px;
    }
    .perf-doc-row {
      display: flex;
      gap: 32px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .perf-doc-stat-label {
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .perf-doc-stat-val {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-1);
      line-height: 1.1;
    }
    .perf-doc-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 22px;
    }
    .perf-doc-section { margin-bottom: 24px; }
    .perf-doc-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 10px;
    }
    .perf-doc-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .perf-doc-tag {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
    }
    .perf-doc-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .perf-doc-list li {
      font-size: 14px;
      color: var(--text-1);
      line-height: 1.6;
      padding-left: 14px;
      position: relative;
    }
    .perf-doc-list li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: var(--text-3);
    }
    .perf-doc-empty-item {
      font-size: 13px;
      color: var(--text-3);
      font-style: italic;
    }
    .perf-empty {
      text-align: center;
      padding: 48px 0;
      color: var(--text-3);
      font-size: 14px;
      line-height: 2;
    }
    .perf-gen-btn {
      width: 100%;
      padding: 13px;
      border-radius: var(--r);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background .12s;
    }
    .perf-gen-btn:hover { background: var(--accent-h); }
    .perf-prompt-box { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .perf-prompt-label {
      font-size: 12px;
      color: var(--text-3);
      text-align: center;
    }
    .perf-prompt-ta {
      width: 100%;
      height: 200px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 12px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      color: var(--text-2);
      background: var(--bg);
      resize: none;
      line-height: 1.6;
    }
    .perf-prompt-ta:focus { outline: none; border-color: var(--accent); }
    .perf-copy-btn {
      width: 100%;
      padding: 11px;
      border-radius: var(--r-sm);
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
      cursor: pointer;
      transition: background .12s;
    }
    .perf-copy-btn:hover { background: var(--bg); }


    @media (max-width: 480px) {
      .panel { padding: 14px; }
      .save-bar { padding: 12px 14px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
      .filter-row { flex-direction: column; }
      .header-top { padding: 0 14px; }
      .tab-bar { padding: 0 14px; }
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <div>
        <div class="wordmark">(yoni's worklog)</div>
      </div>
      <button class="data-btn" onclick="openDataModal()" title="데이터 관리">🍅</button>
    </div>
    <nav class="tab-bar">
      <button class="tab-btn on" id="tb-input" onclick="goTab('input')">입력</button>
      <button class="tab-btn" id="tb-history" onclick="goTab('history')">히스토리</button>
      <button class="tab-btn" id="tb-perf" onclick="goTab('perf')">성과</button>
    </nav>
  </header>

  <!-- Input panel -->
  <div class="panel on" id="p-input">

    <!-- Date nav -->
    <div class="date-nav">
      <button class="nav-arrow" onclick="shiftDate(-1)" aria-label="이전 날">‹</button>
      <div class="date-center" onclick="openCalPop(event)" title="날짜 선택">
        <div class="date-label" id="d-label"></div>
        <div class="date-sub" id="d-sub"></div>
        <span class="date-center-hint">📅</span>
      </div>
      <button class="nav-arrow" onclick="shiftDate(1)" aria-label="다음 날">›</button>
    </div>

    <!-- Today checklist -->
    <div class="cl-block t">
      <div class="cl-head">
        <div class="cl-dot"></div>
        오늘 업무
      </div>
      <div class="cl-list" id="list-t"></div>
      <div class="cl-add-row" id="add-row-t">
        <div class="cl-add-icon">+</div>
        <input class="cl-input" id="in-t" placeholder="항목 추가 후 Enter" onkeydown="onItemKey(event,'t')">
        <span class="cl-tab-hint" id="hint-t">Tab ↓</span>
      </div>
    </div>

    <!-- Tags -->
    <div class="card">
      <div class="card-head">
        <div class="card-label">프로젝트 태그</div>
      </div>
      <div class="card-body">
        <div class="tag-list" id="tag-list"></div>
        <div class="tag-row">
          <input class="tag-field" id="tag-in" placeholder="태그 입력 후 Enter"
            onkeydown="onTagKey(event)" oninput="updateSuggest()" onfocus="updateSuggest()" autocomplete="off">
          <button class="btn-add" onclick="addTag()">추가</button>
        </div>
      </div>
    </div>

    <!-- Memo -->
    <div class="card">
      <div class="card-head">
        <div class="card-label">메모</div>
      </div>
      <div class="card-body">
        <div class="memo-tabs">
          <button class="memo-tab on" id="mt-c" onclick="goMemo('c')">커뮤니케이션</button>
          <button class="memo-tab"    id="mt-n" onclick="goMemo('n')">배운점</button>
          <button class="memo-tab"    id="mt-d" onclick="goMemo('d')">한 줄 일기</button>
        </div>
        <div id="mp-c"><textarea id="m-comm"  rows="4" placeholder="☁️  커뮤니케이션 이슈를 기록하세요"></textarea></div>
        <div id="mp-n" style="display:none"><textarea id="m-next"  rows="4" placeholder="📚  오늘 배운 것을 기록하세요"></textarea></div>
        <div id="mp-d" style="display:none"><textarea id="m-dec"   rows="4" placeholder="🍥  오늘은 점심에 무엇을 먹었나요?"></textarea></div>
      </div>
    </div>

  </div><!-- /p-input -->

  <!-- History panel -->
  <div class="panel" id="p-history">
    <div style="position:relative;margin-bottom:14px">
      <input class="filter-field" id="f-tag" placeholder="🏷  태그로 검색" autocomplete="off"
        oninput="drawHistory();renderFilterTagChips()"
        onfocus="renderFilterTagChips()"
        onblur="window._ftHide=setTimeout(()=>document.getElementById('filter-tag-chips').classList.remove('on'),200)">
      <div class="filter-tag-chips" id="filter-tag-chips"
        onmouseenter="clearTimeout(window._ftHide)"
        onmouseleave="window._ftHide=setTimeout(()=>document.getElementById('filter-tag-chips').classList.remove('on'),200)">
      </div>
    </div>
    <div id="h-list"></div>
  </div>

  <!-- Perf panel -->
  <div class="panel" id="p-perf">
    <div class="perf-month-nav">
      <button class="perf-nav-btn" onclick="perfShiftMonth(-1)">‹</button>
      <span class="perf-month-label" id="perf-month-label"></span>
      <button class="perf-nav-btn" onclick="perfShiftMonth(1)">›</button>
    </div>
    <div id="perf-summary"></div>
    <div class="perf-prompt-box" id="perf-prompt-box" style="display:none">
      <div class="perf-prompt-label">아래 프롬프트를 복사해서 Claude에 붙여넣으세요</div>
      <textarea class="perf-prompt-ta" id="perf-prompt-ta" readonly></textarea>
      <button class="perf-copy-btn" id="perf-copy-btn" onclick="copyPerfPrompt()">📋 프롬프트 복사</button>
    </div>
  </div>

  <!-- Save bar -->
  <div class="save-bar" id="save-bar">
    <button class="btn-save" id="btn-save" onclick="saveLog()">저장하기</button>
  </div>

</div><!-- /app -->

<!-- Modal -->
<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="m-title"></div>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="m-body"></div>
  </div>
</div>

<!-- Data modal -->
<div class="overlay" id="data-overlay" onclick="if(event.target===this)closeDataModal()">
  <div class="modal" style="max-width:420px">
    <div class="modal-head">
      <div class="modal-title">데이터 관리</div>
      <button class="modal-x" onclick="closeDataModal()">×</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:12px;padding-top:4px">
      <div class="data-section">
        <div class="data-section-title">내보내기</div>
        <p class="data-desc">아래 버튼을 누르면 데이터가 텍스트로 나와요. 전체 선택 후 복사해서 다른 기기에 붙여넣으세요.</p>
        <button class="data-action-btn" onclick="exportData()">📋 데이터 내보내기</button>
        <textarea id="export-output" class="data-textarea" readonly placeholder="여기에 데이터가 표시돼요" style="margin-top:10px"></textarea>
      </div>
      <hr style="border:none;border-top:1px solid var(--border)">
      <div class="data-section">
        <div class="data-section-title">불러오기</div>
        <p class="data-desc">다른 기기에서 복사한 데이터를 아래에 붙여넣으세요. 기존 데이터는 덮어씌워져요.</p>
        <textarea id="import-input" class="data-textarea" placeholder="여기에 붙여넣기..."></textarea>
        <button class="data-action-btn" onclick="importData()" style="background:var(--accent);color:#fff;border-color:var(--accent)">📥 불러오기</button>
      </div>
      <hr style="border:none;border-top:1px solid var(--border)">
      <div class="data-section">
        <div class="data-section-title">Markdown으로 저장</div>
        <p class="data-desc">월별 .md 파일로 다운로드할 수 있어요.</p>
        <div id="md-month-list" class="md-month-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- Tag color popover -->
<div class="tag-pop" id="tag-pop"></div>
<div class="cal-pop" id="cal-pop" onclick="event.stopPropagation()">
  <div class="cal-head">
    <button class="cal-nav-btn" onclick="calShiftMonth(-1)">‹</button>
    <div class="cal-head-label" id="cal-label"></div>
    <button class="cal-nav-btn" onclick="calShiftMonth(1)">›</button>
  </div>
  <div class="cal-dow-row">
    <div class="cal-dow">월</div><div class="cal-dow">화</div><div class="cal-dow">수</div>
    <div class="cal-dow">목</div><div class="cal-dow">금</div>
    <div class="cal-dow" style="color:#C92A2A">토</div><div class="cal-dow" style="color:#C92A2A">일</div>

</div>

<div class="tag-suggest" id="tag-suggest"></div>

<div class="toast" id="toast"></div>

<script>
// ─── Firebase ─────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBMH4YOXAnS9IJbCer5DVUw9Ers2OuHmzI",
  authDomain: "worklog-61d3e.firebaseapp.com",
  projectId: "worklog-61d3e",
  storageBucket: "worklog-61d3e.firebasestorage.app",
  messagingSenderId: "876537882032",
  appId: "1:876537882032:web:6c6574be4cd6f8b228a275"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const DOC = db.collection('worklog').doc('data');

// ─── State ────────────────────────────────────────────────────────────────────
let curDate = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();
let curTab  = 'input';
let curMemo = 'c';
let tags    = [];
let logs    = {};  // { 'YYYY-MM-DD': logObj }
let knownTags = {}; // { name: { name, color } } — all tags ever used

// ─── Storage ──────────────────────────────────────────────────────────────────
function backfillKnownTags() {
  Object.values(logs).forEach(log => {
    (log.tags || []).forEach(t => {
      const n = tagName(t);
      if (n && !knownTags[n]) knownTags[n] = { name: n, color: t.color ?? 0 };
    });
  });
}

async function load() {
  // 로컬 캐시 먼저 (빠른 초기 렌더링)
  try { const s = localStorage.getItem('wl_v1'); if (s) logs = JSON.parse(s); } catch(e) {}
  try { const s = localStorage.getItem('wl_tags'); if (s) knownTags = JSON.parse(s); } catch(e) {}
  backfillKnownTags();

  // Firestore에서 최신 데이터 불러오기
  try {
    const doc = await DOC.get();
    if (doc.exists) {
      const data = doc.data();
      if (data.logs) logs = data.logs;
      if (data.knownTags) knownTags = data.knownTags;
      localStorage.setItem('wl_v1', JSON.stringify(logs));
      localStorage.setItem('wl_tags', JSON.stringify(knownTags));
      backfillKnownTags();
      refreshDateUI();
      loadEntry();
      drawHistory();
    }
  } catch(e) { console.warn('Firestore 불러오기 실패, 로컬 사용:', e); }

  // 다른 기기에서 저장 시 실시간 반영 (입력 중인 UI는 건드리지 않음)
  DOC.onSnapshot(snap => {
    if (!snap.exists) return;
    const data = snap.data();
    if (data.logs) { logs = data.logs; localStorage.setItem('wl_v1', JSON.stringify(logs)); }
    if (data.knownTags) { knownTags = data.knownTags; localStorage.setItem('wl_tags', JSON.stringify(knownTags)); }
    drawHistory();
  }, e => console.warn('Firestore 실시간 오류:', e));
}

function persist() {
  try { localStorage.setItem('wl_v1', JSON.stringify(logs)); } catch(e) {}
  DOC.set({ logs, knownTags }, { merge: true }).catch(e => console.warn('Firestore 저장 실패:', e));
}

function persistTags() {
  try { localStorage.setItem('wl_tags', JSON.stringify(knownTags)); } catch(e) {}
  DOC.set({ knownTags }, { merge: true }).catch(e => console.warn('Firestore 저장 실패:', e));
}

// ─── Date helpers ─────────────────────────────────────────────────────────────
const DAYS = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

function key(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function koDate(d) {
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}

function koDow(d) {
  const today = new Date(); today.setHours(0,0,0,0);
  const delta = Math.round((d - today) / 86400000);
  const dow = DAYS[d.getDay()];
  if (delta === 0)  return dow + ' · 오늘';
  if (delta === -1) return dow + ' · 어제';
  if (delta === 1)  return dow + ' · 내일';
  return dow;
}

function isToday(d) {
  const t = new Date(); t.setHours(0,0,0,0);
  return d.getTime() === t.getTime();
}

// ─── Date navigation ──────────────────────────────────────────────────────────
function shiftDate(n) {
  const prevKey = key(curDate);
  let d = new Date(curDate.getTime());
  const step = n > 0 ? 1 : -1;
  let moved = 0;
  while (moved < Math.abs(n)) {
    d = new Date(d.getTime() + step * 86400000);
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) moved++;
  }
  curDate = d;
  const nextKey = key(curDate);

  // 다음날로 이동 시, 오늘 한 일 → 다음날 전날 한 일 자동 채우기
  if (n > 0) {
    const prev = logs[prevKey];
    const next = logs[nextKey];
    const prevTItems = prev?.tItems || [];
    const nextYItems = next?.yItems || [];
    if (prevTItems.length && !nextYItems.length) {
      logs[nextKey] = {
        ...(next || { date: nextKey, t: [], tItems: [], tags: [], memo: {} }),
        y: prevTItems.map(i => i.text),
        yItems: prevTItems.map(i => ({ ...i, done: false })),
      };
      persist();
    }
  }

  refreshDateUI();
  loadEntry();
}

function refreshDateUI() {
  document.getElementById('d-label').innerHTML =
    x(koDate(curDate)) + (isToday(curDate) ? ' <span class="today-pill">TODAY</span>' : '');
  document.getElementById('d-sub').textContent = koDow(curDate);
}

let calYear, calMonth;

function openCalPop(e) {
  e.stopPropagation();
  calYear = curDate.getFullYear();
  calMonth = curDate.getMonth();
  renderCal();
  const pop = document.getElementById('cal-pop');
  pop.classList.add('on');
  const rect = document.getElementById('d-label').getBoundingClientRect();
  const popW = 280;
  let left = rect.left + rect.width / 2 - popW / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - popW - 8));
  pop.style.left = left + 'px';
  pop.style.top = (rect.bottom + 6) + 'px';
}

function closeCalPop() {
  document.getElementById('cal-pop').classList.remove('on');
}

function calShiftMonth(n) {
  calMonth += n;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCal();
}

function renderCal() {
  const todayKey = key(new Date());
  const selKey = key(curDate);
  document.getElementById('cal-label').textContent = `${calYear}년 ${calMonth + 1}월`;

  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const startOffset = firstDay === 0 ? 6 : firstDay - 1;   // Mon=0
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  let html = '';
  for (let i = 0; i < startOffset; i++) {
    html += `<div class="cal-day empty"></div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dk = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(calYear, calMonth, d).getDay();
    const cls = [
      'cal-day',
      dk === todayKey ? 'is-today' : '',
      dk === selKey   ? 'selected' : '',
      logs[dk]        ? 'has-log'  : '',
      (dow === 0 || dow === 6) ? 'weekend' : '',
    ].filter(Boolean).join(' ');
    const col = dow === 6 ? 'color:#1864AB' : dow === 0 ? 'color:#C92A2A' : '';
    const selStyle = dk === selKey ? '' : col ? `style="${col}"` : '';
    html += `<div class="${cls}" ${selStyle} onclick="pickCalDay('${dk}')">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}

function pickCalDay(dk) {
  const [y, m, d] = dk.split('-').map(Number);
  curDate = new Date(y, m - 1, d);
  curDate.setHours(0, 0, 0, 0);
  refreshDateUI();
  loadEntry();
  closeCalPop();
}

// ─── Checklist ────────────────────────────────────────────────────────────────
let items = { y: [], t: [] }; // [{ text, done, level }]
let inputLevel = { y: 0, t: 0 };

function drawList(sec) {
  const el = document.getElementById('list-' + sec);
  if (!el) return;
  el.innerHTML = items[sec].map((item, i) => {
    const lvCls = item.level === 2 ? ' sub2' : item.level === 1 ? ' sub' : '';
    const isTop = item.level === 0;
    return `<div class="cl-item${lvCls}" id="item-${sec}-${i}">
      <input type="checkbox" class="cl-check" ${item.done ? 'checked' : ''}
        onchange="toggleItem('${sec}',${i},this.checked)">
      <span class="cl-text" onclick="editItem('${sec}',${i},this)">${x(item.text)}</span>
      ${isTop ? `<button class="cl-sub-btn" onclick="openInline('${sec}',${i})" title="하위 항목 추가">+ 하위</button>` : ''}
      <button class="cl-del" onclick="delItem('${sec}',${i})">×</button>
    </div>`;
  }).join('');
}

function editItem(sec, i, span) {
  const item = items[sec][i];
  const inp = document.createElement('input');
  inp.className = 'cl-edit-input';
  inp.value = item.text;
  span.replaceWith(inp);
  inp.focus();
  inp.select();

  let committed = false;
  function commit(insertAfter) {
    if (committed) return;
    committed = true;
    const v = inp.value.trim();
    if (v) item.text = v;
    else items[sec].splice(i, 1);
    if (insertAfter) {
      const newIdx = v ? i + 1 : i;
      items[sec].splice(newIdx, 0, { text: '', done: false, level: item.level });
      drawList(sec);
      editItem(sec, newIdx, document.querySelector(`#item-${sec}-${newIdx} .cl-text`));
    } else {
      drawList(sec);
    }
  }

  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); commit(true); }
    if (e.key === 'Escape') { committed = true; drawList(sec); }
  });
  inp.addEventListener('blur', () => commit(false));
}

function openInline(sec, afterIdx) {
  // 이미 열려있으면 닫기
  const existing = document.getElementById('inline-input-row');
  if (existing) existing.remove();

  const row = document.createElement('div');
  row.className = 'cl-inline-row';
  row.id = 'inline-input-row';

  const dot = document.createElement('div');
  dot.style.cssText = 'width:8px;height:8px;border-radius:50%;background:var(--text-3);flex-shrink:0';

  const inp = document.createElement('input');
  inp.className = 'cl-inline-input';
  inp.placeholder = '하위 항목 입력 후 Enter';

  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.isComposing) {
      e.preventDefault();
      const v = inp.value.trim();
      if (v) {
        items[sec].splice(afterIdx + 1, 0, { text: v, done: false, level: 1 });
      }
      drawList(sec);
    }
    if (e.key === 'Escape') {
      row.remove();
    }
  });

  inp.addEventListener('blur', () => setTimeout(() => row.remove(), 150));

  row.appendChild(dot);
  row.appendChild(inp);

  const anchor = document.getElementById(`item-${sec}-${afterIdx}`);
  anchor.insertAdjacentElement('afterend', row);
  inp.focus();
}

function updateAddRow(sec) {
  const lv = inputLevel[sec];
  const row = document.getElementById('add-row-' + sec);
  if (!row) return;
  row.classList.toggle('sub',  lv === 1);
  row.classList.toggle('sub2', lv === 2);
  const hint = document.getElementById('hint-' + sec);
  if (hint) hint.textContent = lv > 0 ? '⇧Tab ↑' : 'Tab ↓';
}

function addItem(sec) {
  const el = document.getElementById('in-' + sec);
  const v = el.value.trim();
  if (!v) return;
  items[sec].push({ text: v, done: false, level: inputLevel[sec] });
  drawList(sec);
  el.value = '';
  el.focus();
}

function delItem(sec, i) {
  items[sec].splice(i, 1);
  drawList(sec);
}

function toggleItem(sec, i, done) {
  items[sec][i].done = done;
}

function onItemKey(e, sec) {
  if (e.key === 'Tab') {
    e.preventDefault();
    inputLevel[sec] = e.shiftKey ? Math.max(0, inputLevel[sec] - 1) : Math.min(2, inputLevel[sec] + 1);
    updateAddRow(sec);
    return;
  }
  if (e.key === 'Backspace' && e.currentTarget.value === '' && inputLevel[sec] > 0) {
    e.preventDefault();
    inputLevel[sec] = Math.max(0, inputLevel[sec] - 1);
    updateAddRow(sec);
    return;
  }
  if (e.key === 'Enter' && !e.isComposing) {
    e.preventDefault();
    addItem(sec);
  }
}

// ─── Tag colors ───────────────────────────────────────────────────────────────
const TAG_PALETTE = [
  { name: '회색',   bg: '#F1F3F5', text: '#495057' },
  { name: '빨간색', bg: '#FFF5F5', text: '#C92A2A' },
  { name: '주황색', bg: '#FFF4E6', text: '#D9480F' },
  { name: '노란색', bg: '#FFF9DB', text: '#9C6B00' },
  { name: '초록색', bg: '#EBFBEE', text: '#2B8A3E' },
  { name: '청록색', bg: '#E6FCF5', text: '#0C8599' },
  { name: '파란색', bg: '#E7F5FF', text: '#1864AB' },
  { name: '보라색', bg: '#F3F0FF', text: '#6741D9' },
  { name: '분홍색', bg: '#FFF0F6', text: '#C2255C' },
];

// ─── Tags ─────────────────────────────────────────────────────────────────────
function drawTags() {
  document.getElementById('tag-list').innerHTML = tags.map((t, i) => {
    const c = TAG_PALETTE[t.color ?? 0];
    return `<div class="chip" style="background:${c.bg};color:${c.text}" onclick="openTagPop(event,${i})">${x(t.name)}<button class="chip-x" style="color:${c.text}" onclick="event.stopPropagation();rmTag(${i})">×</button></div>`;
  }).join('');
}

function getAllUsedTags() {
  return Object.values(knownTags);
}

let suggestIdx = -1;

function updateSuggest() {
  const el = document.getElementById('tag-in');
  const query = el.value.trim().toLowerCase();
  const all = getAllUsedTags();
  const filtered = all.filter(t =>
    !tags.some(cur => cur.name === t.name) &&
    (query === '' || t.name.toLowerCase().includes(query))
  );
  const box = document.getElementById('tag-suggest');
  suggestIdx = -1;
  if (!filtered.length) { box.classList.remove('on'); return; }
  const rect = el.getBoundingClientRect();
  box.style.top  = (rect.bottom + 4) + 'px';
  box.style.left = rect.left + 'px';
  box.style.width = rect.width + 'px';
  box.innerHTML = filtered.map((t, i) => {
    const c = TAG_PALETTE[t.color ?? 0];
    return `<div class="suggest-item" data-name="${x(t.name)}" data-color="${t.color ?? 0}"
      onmousedown="pickSuggest('${x(t.name)}',${t.color ?? 0})">
      <span class="chip" style="background:${c.bg};color:${c.text};padding:2px 9px;font-size:11px">${x(t.name)}</span>
      <span class="suggest-del" onmousedown="event.stopPropagation();deleteKnownTag('${x(t.name)}')" title="삭제">×</span>
    </div>`;
  }).join('');
  box.classList.add('on');
}

function pickSuggest(name, color) {
  if (tags.some(t => t.name === name)) return;
  tags.push({ name, color });
  drawTags();
  const el = document.getElementById('tag-in');
  el.value = '';
  document.getElementById('tag-suggest').classList.remove('on');
  el.focus();
}

function deleteKnownTag(name) {
  delete knownTags[name];
  persistTags();
  renderTagSuggest(document.getElementById('tag-in'));
}

function closeSuggest() {
  document.getElementById('tag-suggest').classList.remove('on');
  suggestIdx = -1;
}

document.addEventListener('click', e => {
  if (!e.target.closest('.tag-row')) closeSuggest();
});

function addTag() {
  const el = document.getElementById('tag-in');
  const v = el.value.trim();
  if (!v) return;
  if (tags.some(t => t.name === v)) { toast('이미 있는 태그입니다'); return; }
  // 기존에 쓴 태그면 같은 색상 유지
  const color = knownTags[v] ? knownTags[v].color : 0;
  tags.push({ name: v, color });
  knownTags[v] = { name: v, color };
  persistTags();
  drawTags();
  el.value = '';
  closeSuggest();
}

function rmTag(i) { tags.splice(i,1); closeTagPop(); drawTags(); }

function onTagKey(e) {
  const box = document.getElementById('tag-suggest');
  const rows = box.querySelectorAll('.suggest-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    suggestIdx = Math.min(suggestIdx + 1, rows.length - 1);
    rows.forEach((r, i) => r.classList.toggle('focused', i === suggestIdx));
    return;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    suggestIdx = Math.max(suggestIdx - 1, -1);
    rows.forEach((r, i) => r.classList.toggle('focused', i === suggestIdx));
    return;
  }
  if (e.key === 'Enter' && !e.isComposing) {
    e.preventDefault();
    if (suggestIdx >= 0 && rows[suggestIdx]) {
      const el = rows[suggestIdx];
      pickSuggest(el.dataset.name, parseInt(el.dataset.color));
    } else {
      addTag();
    }
    return;
  }
  if (e.key === 'Escape') { closeSuggest(); return; }
}

// ─── Tag popover ──────────────────────────────────────────────────────────────
let popIdx = -1;

function openTagPop(e, i) {
  e.stopPropagation();
  popIdx = i;
  const pop = document.getElementById('tag-pop');
  const tag = tags[i];
  const rect = e.currentTarget.getBoundingClientRect();

  pop.innerHTML = `
    <div class="pop-name">${x(tag.name)}</div>
    <button class="pop-del" onclick="rmTag(${i})">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M6 2h4a1 1 0 0 0-2 0H6a1 1 0 0 0-2 0zm-2 2h8l-.8 9H4.8L4 4zm2 2v5h1V6H6zm3 0v5h1V6H9z"/></svg>
      삭제
    </button>
    <div class="pop-colors-label">색상</div>
    ${TAG_PALETTE.map((c, ci) => `
      <div class="pop-color-row" onclick="setTagColor(${i},${ci})">
        <div class="pop-swatch" style="background:${c.bg};outline:1px solid ${c.text}33"></div>
        <span class="pop-color-name">${c.name}</span>
        <span class="pop-check">${tag.color === ci ? '✓' : ''}</span>
      </div>
    `).join('')}
  `;

  // position below the chip, stay in viewport
  const top = rect.bottom + 6;
  const left = Math.min(rect.left, window.innerWidth - 200);
  pop.style.top = top + 'px';
  pop.style.left = left + 'px';
  pop.classList.add('on');
}

function setTagColor(i, ci) {
  tags[i].color = ci;
  const n = tags[i].name;
  if (n) {
    knownTags[n] = { name: n, color: ci };
    persistTags();
    // 모든 기존 로그의 같은 이름 태그 색상도 업데이트
    Object.values(logs).forEach(e => {
      (e.tags || []).forEach(t => { if (tagName(t) === n) t.color = ci; });
    });
    persist();
  }
  drawTags();
  closeTagPop();
}

function closeTagPop() {
  document.getElementById('tag-pop').classList.remove('on');
  popIdx = -1;
}

document.addEventListener('click', e => {
  const pop = document.getElementById('tag-pop');
  if (pop.classList.contains('on') && !pop.contains(e.target)) closeTagPop();
  const cal = document.getElementById('cal-pop');
  if (cal.classList.contains('on') && !cal.contains(e.target) && !e.target.closest('.date-center')) closeCalPop();
});

// ─── Memo tabs ────────────────────────────────────────────────────────────────
function goMemo(k) {
  curMemo = k;
  ['c','d','n'].forEach(t => {
    document.getElementById(`mt-${t}`).classList.toggle('on', t === k);
    document.getElementById(`mp-${t}`).style.display = t === k ? '' : 'none';
  });
}

// ─── Tab switching ────────────────────────────────────────────────────────────
function goTab(t) {
  curTab = t;
  document.getElementById('p-input').classList.toggle('on', t === 'input');
  document.getElementById('p-history').classList.toggle('on', t === 'history');
  document.getElementById('p-perf').classList.toggle('on', t === 'perf');
  document.getElementById('save-bar').style.display = t === 'input' ? '' : 'none';
  document.getElementById('tb-input').classList.toggle('on', t === 'input');
  document.getElementById('tb-history').classList.toggle('on', t === 'history');
  document.getElementById('tb-perf').classList.toggle('on', t === 'perf');
  if (t === 'history') { historyShowAll = false; drawHistory(); }
  if (t === 'perf') drawPerfReport();
}

function goToDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  curDate = new Date(y, m - 1, d);
  goTab('input');
  refreshDateUI();
  loadEntry();
}

// ─── Save ─────────────────────────────────────────────────────────────────────
function saveLog() {
  logs[key(curDate)] = collectEntry(false);
  persist();
  toast('저장되었습니다 ✓');
  const btn = document.getElementById('btn-save');
  btn.textContent = '저장됨 ✓'; btn.classList.add('ok');
  setTimeout(() => { btn.textContent = '저장하기'; btn.classList.remove('ok'); }, 2200);
}

// ─── Load entry ───────────────────────────────────────────────────────────────
function loadEntry() {
  const e = logs[key(curDate)];
  items.y = e?.yItems ? e.yItems.map(i => typeof i === 'string' ? {text:i,done:false,level:0} : {...i,level:i.level??0}) : [];
  items.t = e?.tItems ? e.tItems.map(i => typeof i === 'string' ? {text:i,done:false,level:0} : {...i,level:i.level??0}) : [];
  inputLevel.y = 0; inputLevel.t = 0;
  updateAddRow('y'); updateAddRow('t');
  drawList('y');
  drawList('t');
  tags = e ? [...(e.tags || [])] : [];
  drawTags();
  document.getElementById('m-comm').value = e?.memo?.comm || '';
  document.getElementById('m-dec').value  = e?.memo?.dec  || '';
  document.getElementById('m-next').value = e?.memo?.next || '';
}

function collectEntry(isDraft) {
  return {
    date: key(curDate),
    y: items.y.map(i => i.text),
    t: items.t.map(i => i.text),
    yItems: [...items.y],
    tItems: [...items.t],
    tags: [...tags],
    memo: {
      comm: document.getElementById('m-comm').value,
      dec:  document.getElementById('m-dec').value,
      next: document.getElementById('m-next').value,
    },
    isDraft,
    saved: new Date().toISOString(),
  };
}

let historyShowAll = false;

function renderFilterTagChips() {

  container.innerHTML = filtered.map(t => {
    const c = TAG_PALETTE[t.color ?? 0];

    return `<span class="filter-tag-chip${sel}" style="background:${c.bg};color:${c.text}"
      onmousedown="event.preventDefault();pickFilterTag('${x(t.name)}')">${x(t.name)}</span>`;

function drawHistory() {
  const fTag = document.getElementById('f-tag').value.trim().toLowerCase();
  let entries = Object.values(logs).sort((a,b) => b.date.localeCompare(a.date));

  if (fTag) entries = entries.filter(e => (e.tags||[]).some(t => tagName(t).toLowerCase().includes(fTag)));

  const el = document.getElementById('h-list');
  if (!entries.length) {
    el.innerHTML = `<div class="empty-msg"><strong>기록이 없습니다</strong>조건을 바꾸거나 새 기록을 작성해보세요</div>`;
    return;
  }

  // Week bucket label
  function weekDiff(dateStr) {
    const now = new Date();
    const dow = now.getDay();
    const thisMonday = new Date(now);
    thisMonday.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
    thisMonday.setHours(0, 0, 0, 0);
    const d = new Date(dateStr + 'T00:00:00');
    const dDow = d.getDay();
    const dMonday = new Date(d);
    dMonday.setDate(d.getDate() - (dDow === 0 ? 6 : dDow - 1));
    dMonday.setHours(0, 0, 0, 0);
    return Math.round((thisMonday - dMonday) / (7 * 86400000));
  }

  function weekLabel(dateStr) {
    const diff = weekDiff(dateStr);
    if (diff === 0) return '이번 주';
    if (diff === 1) return '지난 주';
    if (diff === 2) return '2주 전';
    if (diff === 3) return '3주 전';
    const d = new Date(dateStr + 'T00:00:00');
    return `${d.getFullYear()}년 ${d.getMonth()+1}월`;
  }

  const isFiltering = !!fTag;
  const recent  = isFiltering ? entries : entries.filter(e => weekDiff(e.date) <= 2);
  const older   = isFiltering ? []      : entries.filter(e => weekDiff(e.date) >= 3);
  const visible = historyShowAll ? entries : recent;

  let lastLabel = null;
  const parts = [];
  visible.forEach(e => {
    const lbl = weekLabel(e.date);
    if (lbl !== lastLabel) {
      parts.push(`<div class="h-week-label">${lbl}</div>`);
      lastLabel = lbl;
    }
    const d = new Date(e.date + 'T00:00:00');
    const tArr = (e.tItems||e.t||[]).filter(i => (i.level ?? 0) === 0);
    const preview = tArr.slice(0,3).map(itemText).filter(Boolean).join(' · ');
    const etags = e.tags||[];
    parts.push(`<div class="h-entry" onclick="openModal('${e.date}')">
      <div class="h-top">
        <div class="h-date">${x(koDate(d))}<span class="h-day">${x(koDow(d))}</span></div>
        <div class="h-chips">${etags.map(t => { const c=TAG_PALETTE[t.color??0]; return `<div class="h-chip" style="background:${c.bg};color:${c.text}">${x(tagName(t))}</div>`; }).join('')}</div>
      </div>
      <div class="h-preview">${preview ? x(preview) : '<em style="opacity:.5">내용 없음</em>'}</div>
      <div class="h-meta">
        ${(() => { const c=e.memo?.comm?.trim(),d=e.memo?.dec?.trim(),n=e.memo?.next?.trim();
          if (!c&&!d&&!n) return '<div class="h-stat" style="opacity:.3">☁️</div><div class="h-stat" style="opacity:.3">🐶</div><div class="h-stat" style="opacity:.3">🌿</div>';
          return (c?`<div class="h-stat h-diary-text">${x(c)}</div>`:'')+(d?`<div class="h-stat h-diary-text">${x(d)}</div>`:'')+(n?`<div class="h-stat">${x(n)}</div>`:'');
        })()}
        <div style="flex:1"></div>
        <button class="h-del-btn" id="del-${e.date}" onclick="event.stopPropagation();confirmDelete(this,'${e.date}')" title="삭제">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M6.5 1a.5.5 0 0 0 0 1h3a.5.5 0 0 0 0-1h-3zM2 3.5a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1H13v8a1.5 1.5 0 0 1-1.5 1.5h-7A1.5 1.5 0 0 1 3 12.5V4H2.5a.5.5 0 0 1-.5-.5zm2 .5v8a.5.5 0 0 0 .5.5h7a.5.5 0 0 0 .5-.5V4H4zm2 1.5a.5.5 0 0 1 .5.5v5a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 0a.5.5 0 0 1 .5.5v5a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5z"/>
          </svg>
        </button>
      </div>
    </div>`);
  });
  if (!historyShowAll && older.length) {
    parts.push(`<div class="h-load-more" onclick="historyShowAll=true;drawHistory()">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>${older.length}개 더 보기</span>
    </div>`);
  }
  el.innerHTML = parts.join('');
}

let perfYear  = new Date().getFullYear();
let perfMonth = new Date().getMonth() + 1;

function perfShiftMonth(n) {
  perfMonth += n;
  if (perfMonth > 12) { perfMonth = 1;  perfYear++; }
  if (perfMonth < 1)  { perfMonth = 12; perfYear--; }
  drawPerfReport();
}

function drawPerfReport() {
  document.getElementById('perf-month-label').textContent = `${perfYear}년 ${perfMonth}월`;
  document.getElementById('perf-prompt-box').style.display = 'none';

  const prefix  = `${perfYear}-${String(perfMonth).padStart(2,'0')}`;
  const entries = Object.values(logs)
    .filter(e => e.date.startsWith(prefix))
    .sort((a,b) => a.date.localeCompare(b.date));

  const summaryEl = document.getElementById('perf-summary');

  if (!entries.length) {
    summaryEl.innerHTML = `<div class="perf-empty">이 달의 기록이 없어요 🌿</div>`;
    return;
  }

  // 태그 빈도 집계
  const tagCount = new Map();
  entries.forEach(e => {
    (e.tags||[]).forEach(t => {
      const n = tagName(t);
      tagCount.set(n, (tagCount.get(n) || 0) + 1);
    });
  });
  const sortedTags = [...tagCount.entries()].sort((a, b) => b[1] - a[1]);

  const tagChips = sortedTags.length
    ? sortedTags.map(([n, cnt]) => {
        const colorIdx = knownTags[n]?.color ?? 0;
        const c = TAG_PALETTE[colorIdx];
        return `<span class="perf-doc-tag" style="background:${c.bg};color:${c.text};border-color:transparent">${x(n)} <span style="opacity:.55;font-weight:400">${cnt}</span></span>`;
      }).join('')
    : `<span class="perf-doc-empty-item">태그 없음</span>`;

  summaryEl.innerHTML = `
    <div class="perf-doc">
      <div class="perf-doc-row">
        <div>
          <div class="perf-doc-stat-label">총 기록</div>
          <div class="perf-doc-stat-val">${entries.length}일</div>
        </div>
      </div>
      <hr class="perf-doc-divider">
      <div class="perf-doc-section">
        <div class="perf-doc-section-title">프로젝트</div>
        <div class="perf-doc-tags">${tagChips}</div>
      </div>
      <button class="perf-gen-btn" onclick="generatePerfPrompt()">✨ AI 회고 프롬프트 만들기</button>
    </div>
  `;
}


function generatePerfPrompt() {
  const prefix  = `${perfYear}-${String(perfMonth).padStart(2,'0')}`;
  const entries = Object.values(logs)
    .filter(e => e.date.startsWith(prefix))
    .sort((a,b) => a.date.localeCompare(b.date));

  // 날짜별 데이터 정리
  const lines = entries.map(e => {
    const tItems = e.tItems || (e.t||[]).map(t => ({text:t,done:false,level:0}));
    const tags   = (e.tags||[]).map(t => tagName(t)).join(', ');
    const items  = tItems.map(i => `  - [${i.done?'완료':'미완료'}] ${itemText(i)}`).join('\n');
    const comm   = e.memo?.comm?.trim();
    const diary  = e.memo?.dec?.trim();
    const lunch  = e.memo?.next?.trim();
    let memo = '';
    if (comm)  memo += `\n  커뮤니케이션: ${comm}`;
    if (diary) memo += `\n  한 줄 일기: ${diary}`;
    if (lunch) memo += `\n  배운점: ${lunch}`;
    return `[${e.date}]${tags ? ` (${tags})` : ''}\n${items}${memo}`;
  }).join('\n\n');

  const prompt =
`당신은 성장을 돕는 팀 매니저입니다. 온화하고 명확하고 통찰력이 좋은 성격입니다.

아래는 제가 ${perfYear}년 ${perfMonth}월에 기록한 업무 워크로그입니다.

---
${lines}
---

이 데이터를 바탕으로 다음 내용을 회고 형식으로 작성해주세요:

1. **이달의 주요 업무 요약** — 어떤 프로젝트에 집중했는지 전체적인 흐름
2. **잘한 점** — 구체적인 업무 내용을 근거로 칭찬
3. **돌아보면 좋을 점** — 부드럽게, 성장의 관점에서
4. **다음 달을 위한 한마디**

줄글 형식으로, 따뜻하고 통찰력 있게 작성해주세요.`;

  const ta = document.getElementById('perf-prompt-ta');
  const box = document.getElementById('perf-prompt-box');
  ta.value = prompt;
  box.style.display = 'flex';
  box.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderMdMonthList() {
  const container = document.getElementById('md-month-list');
  // 연도-월별로 그룹핑
  const grouped = {};
  Object.values(logs).forEach(e => {
    const [y, m] = e.date.split('-');
    const yk = y, mk = m;
    if (!grouped[yk]) grouped[yk] = {};
    if (!grouped[yk][mk]) grouped[yk][mk] = 0;
    grouped[yk][mk]++;
  });

  const years = Object.keys(grouped).sort((a,b) => b - a);
  if (!years.length) {
    container.innerHTML = '<div style="font-size:13px;color:var(--text-3)">저장된 기록이 없어요</div>';
    return;
  }

  const parts = [];
  years.forEach(y => {
    parts.push(`<div class="md-year-label">${y}년</div>`);
    const months = Object.keys(grouped[y]).sort((a,b) => a - b);
    months.forEach(m => {
      const count = grouped[y][m];
      const label = `${String(m).padStart(2,'0')}월`;
      parts.push(`
        <div class="md-month-row">
          <div>
            <div class="md-month-name">📄 ${label}.md</div>
            <div class="md-month-count">${count}일 기록</div>
          </div>
          <button class="md-dl-btn" onclick="downloadMd('${y}','${m}')">↓ 저장</button>
        </div>`);
    });
  });
  container.innerHTML = parts.join('');
}

async function downloadMd(year, month) {
  const prefix = `${year}-${String(month).padStart(2,'0')}`;
  const entries = Object.values(logs)
    .filter(e => e.date.startsWith(prefix))
    .sort((a,b) => a.date.localeCompare(b.date));

  const DOW = ['일','월','화','수','목','금','토'];
  const lines = [`# ${year}년 ${Number(month)}월 워크로그\n`];

  entries.forEach(e => {
    const d = new Date(e.date + 'T00:00:00');
    const dow = DOW[d.getDay()];
    lines.push(`## ${e.date} (${dow})`);

    const etags = (e.tags||[]).map(t => tagName(t));
    if (etags.length) lines.push(`> 태그: ${etags.join(', ')}\n`);

    const tItems = e.tItems || (e.t||[]).map(t => ({text:t,done:false,level:0}));
    if (tItems.length) {
      tItems.forEach(i => {
        const indent = '  '.repeat(i.level||0);
        lines.push(`${indent}- ${itemText(i)}`);
      });
    }

    const comm  = e.memo?.comm?.trim();
    const diary = e.memo?.dec?.trim();
    const lunch = e.memo?.next?.trim();
    lines.push('');
    lines.push('### 메모');
    lines.push(`- 📚 배운점: ${lunch || '—'}`);
    lines.push(`- ☁️ 커뮤니케이션: ${comm || '—'}`);
    lines.push(`- 🐶 한 줄 일기: ${diary || '—'}`);
    lines.push('\n---\n');
  });

  const content  = lines.join('\n');
  const filename = `${year}-${String(month).padStart(2,'0')}월.md`;
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });

  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: filename,
        types: [{ description: 'Markdown 파일', accept: { 'text/markdown': ['.md'] } }],
      });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      toast(`${filename} 저장됐어요 ✓`);
    } catch(e) {
      if (e.name !== 'AbortError') toast('저장 실패: ' + e.message);
    }
  } else {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast(`${filename} 저장됐어요 ✓`);
  }
}

function toast(msg) {
  clearTimeout(_toastTimer);
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  _toastTimer = setTimeout(() => el.classList.remove('on'), 2200);
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function tagName(t) { return typeof t === 'string' ? t : t.name; }

function itemText(i) { return typeof i === 'string' ? i : i.text; }

function x(s) {
  return String(s??'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Keyboard shortcut ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    if (curTab === 'input') saveLog();
  }
  if (e.key === 'Escape') closeModal();
});
